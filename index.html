<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/08-calculator.css">
</head>
<body>
    <p class="js-input-equation"></p>
    <p>
        <button class="calculator-button" onclick="
                    updateCalculation('1');
                ">1
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('2');
                ">2
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('3');
            ">3
        </button>

        <button class="calculator-operation-button" onclick="
                    updateCalculation(' + ');
                ">+
        </button>
    </p>

    <p>
        <button class="calculator-button" onclick="
                    updateCalculation('4');
                ">4
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('5');
            ">5
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('6');
                ">6
        </button>

        <button class="calculator-operation-button" onclick="
                    updateCalculation(' - ');
                ">-
        </button>
    </p>

    <p>
        <button class="calculator-button" onclick="
                    updateCalculation('7');
                ">7
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('8');
            ">8
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('9');
                ">9
        </button>

        <button class="calculator-operation-button" onclick="
                    updateCalculation(' * ');
                ">*
        </button>

    </p>



    <p>
        <button class="calculator-button" onclick="
                    updateCalculation('0');
                ">0
        </button>

        <button class="calculator-button" onclick="
                    updateCalculation('.');
                ">.
        </button>

        <button class="calculator-operation-button" onclick="
                    updateCalculation('/');
                ">/
        </button>

        <button class="calculator-button" onclick="
                calculation = eval(calculation);
                console.log(calculation);

                saveCalculation();
            ">=
        </button>
    </p>

    <p>
        <button class="calculator-button" onclick="
                    calculation ='';
                    console.log('cleared.');
                    saveCalculation();
            ">Clear
        </button>
    </p>

    <script src="scripts/08-calculator.js"></script>
</body>

</html>
